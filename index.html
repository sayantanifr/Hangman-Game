<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🎮 Hangman Game</h1>

    <p class="subtitle">Guess the hidden word one letter at a time!</p>

    <h2 id="word">_ _ _ _ _</h2>

    <p id="message">Start guessing...</p>

    <div id="letters"></div>

    <h3>❤️ Lives Left: <span id="lives">6</span></h3>

    <button id="restart">Play Again</button>

</div>

<script src="script.js"></script>

</body>
</html>
